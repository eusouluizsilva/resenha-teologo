name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Delete existing production deployment
        run: |
          PROD_DEPLOY_ID=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&teamId=${{ secrets.VERCEL_TEAM_ID }}&target=production&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin).get('deployments',[]); print(d[0]['uid'] if d else '')" 2>/dev/null)

          if [ -n "$PROD_DEPLOY_ID" ]; then
            echo "Deleting production deployment: $PROD_DEPLOY_ID"
            curl -sf -X DELETE \
              "https://api.vercel.com/v13/deployments/$PROD_DEPLOY_ID?teamId=${{ secrets.VERCEL_TEAM_ID }}" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" || true
            echo "Deleted."
          else
            echo "No existing production deployment found."
          fi

      - name: Deploy to production
        run: |
          npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
