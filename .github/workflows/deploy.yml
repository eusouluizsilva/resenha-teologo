name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build
        run: npm run build

      - name: Pull Vercel project settings
        run: |
          npx vercel pull --yes --environment production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Create Vercel prebuilt output
        run: |
          npx vercel build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: |
          DEPLOY_DIR="$(mktemp -d)"
          mkdir -p "$DEPLOY_DIR/.vercel"
          cp .vercel/project.json "$DEPLOY_DIR/.vercel/project.json"
          cp -R .vercel/output "$DEPLOY_DIR/.vercel/output"
          cd "$DEPLOY_DIR"
          npx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
