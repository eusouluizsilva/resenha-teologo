name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1 \
            | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed preview: $DEPLOY_URL"

      - name: Promote to production
        run: |
          npx vercel promote ${{ steps.deploy.outputs.url }} --yes --token=${{ secrets.VERCEL_TOKEN }}
