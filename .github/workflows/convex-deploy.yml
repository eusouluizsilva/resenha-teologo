name: Deploy Convex (production)

on:
  push:
    branches: [main]
    paths:
      - 'convex/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --prefer-offline

      - name: Typecheck local antes de subir
        run: npm run check

      - name: Deploy Convex functions to production
        # --typecheck=enabled (default): falha se schema/funcoes nao compilam.
        # Antes rodava com --typecheck=disable e ja subimos backend quebrado.
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Convex deploy falhou. Schema de producao pode estar desatualizado."
          echo "::error::Rode: CONVEX_DEPLOY_KEY=<chave> npx convex deploy"
          echo "::error::Ou acione manualmente: gh workflow run 'Deploy Convex (production)' --repo eusouluizsilva/resenha-teologo"
