name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build
        env:
          VITE_CONVEX_URL: https://blessed-platypus-993.convex.cloud
          VITE_CLERK_PUBLISHABLE_KEY: pk_dummy_for_ci

      - name: Bundle size budget
        run: npm run size
